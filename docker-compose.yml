version: '3.9'

services:
  nexus-ai:
    build: .
    ports:
      - '8000:8000'
    volumes:
      - ./backend:/app/backend
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite:///./data/nexus_ai.db
      - SECRET_KEY=replace-with-strong-secret
      - OPENAI_API_KEY=
      - OLLAMA_URL=http://localhost:11434
      - LOCAL_MODEL_API_URL=
